services:
  - type: web
    name: agrichain-backend
    runtime: python
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: gunicorn farmtrace_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: agrichain-postgres
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: https://agrichain-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://agrichain-backend.onrender.com,https://agrichain-frontend.onrender.com
      - key: FRONTEND_BASE_URL
        value: https://agrichain-frontend.onrender.com
      - key: BACKEND_BASE_URL
        value: https://agrichain-backend.onrender.com
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"

  - type: static_site
    name: agrichain-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: VITE_API_BASE_URL
        value: https://agrichain-backend.onrender.com/api
      - key: VITE_APP_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: agrichain-postgres
    databaseName: agrichain
    user: agrichain_user
