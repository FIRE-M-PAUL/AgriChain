services:
  - type: static_site
    name: agrichain-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: VITE_API_BASE_URL
        value: /api
      - key: VITE_APP_ENV
        value: production
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_SOLANA_NETWORK
        value: devnet
      - key: VITE_SOLANA_RPC_URL
        value: https://api.devnet.solana.com
      - key: VITE_SOLANA_EXPLORER
        value: https://explorer.solana.com
      - key: VITE_SOLANA_PROGRAM_ID
        sync: false
      - key: VITE_ELEVENLABS_API_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
